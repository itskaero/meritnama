<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — MeritNama</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <style>
    /* ══════════════════════════════════════════
       CHATBOX — Modern Real-time Chat UI
    ══════════════════════════════════════════ */

    .chat-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 140px);
      min-height: 500px;
    }

    /* ── Chat container ── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 40px rgba(77,184,217,0.04);
    }

    /* ── Chat header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(77,184,217,0.03);
    }
    .chat-header-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .chat-header-info h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .chat-header-info p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 2px 0 0;
    }
    .chat-online-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--neon-green);
    }
    .chat-online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(77,184,217,0.2);
      border-radius: 3px;
    }

    /* ── Message bubble ── */
    .chat-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      padding: 4px 0;
      animation: msg-in 0.3s ease;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-msg:hover .chat-msg-actions { opacity: 1; }

    .chat-msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .chat-msg-content {
      flex: 1;
      min-width: 0;
    }
    .chat-msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }
    .chat-msg-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--neon-cyan);
    }
    .chat-msg-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 100px;
      border: 1px solid;
    }
    .chat-msg-tag-spec { color: var(--neon-purple); border-color: rgba(124,101,196,0.3); background: rgba(124,101,196,0.08); }
    .chat-msg-tag-year { color: var(--neon-green); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.08); }
    .chat-msg-tag-hosp { color: var(--neon-gold); border-color: rgba(232,166,39,0.3); background: rgba(232,166,39,0.08); }
    .chat-msg-time {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-left: auto;
    }

    .chat-msg-text {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 0 12px 12px 12px;
      padding: 0.55rem 0.85rem;
      margin-top: 2px;
    }

    /* ── Reply indicator ── */
    .chat-msg-reply-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding-left: 12px;
      border-left: 2px solid var(--neon-purple);
      cursor: pointer;
      transition: color 0.15s;
    }
    .chat-msg-reply-indicator:hover { color: var(--neon-cyan); }
    .chat-msg-reply-indicator .reply-preview {
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Reactions ── */
    .chat-msg-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .chat-reaction-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      color: var(--text-muted);
    }
    .chat-reaction-btn:hover {
      border-color: var(--border-hover);
      background: rgba(77,184,217,0.06);
      transform: scale(1.05);
    }
    .chat-reaction-btn.active {
      border-color: var(--neon-cyan);
      background: rgba(77,184,217,0.1);
      color: var(--text);
    }
    .chat-reaction-btn .reaction-count {
      font-size: 0.68rem;
      font-weight: 600;
      min-width: 8px;
      text-align: center;
    }

    /* ── Message hover actions ── */
    .chat-msg-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .chat-action-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.12s;
    }
    .chat-action-btn:hover { background: rgba(77,184,217,0.1); }

    /* ── Emoji picker popover ── */
    .emoji-picker-popover {
      position: absolute;
      top: 32px;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      gap: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 100;
      animation: msg-in 0.15s ease;
    }
    .emoji-picker-popover button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.12s, transform 0.1s;
    }
    .emoji-picker-popover button:hover {
      background: rgba(77,184,217,0.1);
      transform: scale(1.2);
    }

    /* ── Date separator ── */
    .chat-date-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0.75rem 0;
    }
    .chat-date-sep::before,
    .chat-date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .chat-date-sep span {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── Chat input area ── */
    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .chat-reply-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.6rem;
      background: rgba(124,101,196,0.06);
      border-left: 3px solid var(--neon-purple);
      border-radius: 0 8px 8px 0;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .chat-reply-preview.active { display: flex; }
    .chat-reply-preview .reply-to-name {
      font-weight: 700;
      color: var(--neon-purple);
    }
    .chat-reply-preview .reply-to-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-reply-cancel {
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .chat-reply-cancel:hover { color: var(--danger); }

    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input-wrapper {
      flex: 1;
      position: relative;
    }
    .chat-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .chat-input:focus { border-color: var(--border-active); }
    .chat-input::placeholder { color: var(--text-light); }

    .chat-send-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .chat-send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Name setup bar ── */
    .chat-name-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.6rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(62,207,142,0.03);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .chat-name-bar label {
      font-weight: 600;
      white-space: nowrap;
    }
    .chat-name-input {
      flex: 1;
      max-width: 200px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      outline: none;
    }
    .chat-name-input:focus { border-color: var(--border-active); }

    /* ── Empty state ── */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 2rem;
      text-align: center;
    }
    .chat-empty-icon { font-size: 3rem; opacity: 0.3; }
    .chat-empty p { font-size: 0.88rem; max-width: 300px; }

    /* ── Loading state ── */
    .chat-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      gap: 8px;
    }
    .chat-loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .chat-page { padding: 0.75rem 0.5rem 1rem; height: calc(100vh - 120px); }
      .chat-messages { padding: 1rem; }
      .chat-input-area { padding: 0.75rem 1rem; }
      .chat-header { padding: 0.75rem 1rem; }
      .chat-msg-actions { display: none; }
      .chat-msg { position: static; }
      .chat-msg-text { border-radius: 8px; }
    }
  </style>
</head>
<body>

<!-- ======= AUTH ======= -->
<script src="auth.js"></script>
<script src="presence.js"></script>

<!-- ======= HEADER ======= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-area">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;">
        <img src="logo.svg" class="logo-img" alt="Meritnama" />
      </a>
    </div>
    <div class="header-meta">
      <span class="badge badge-info">Live Chat</span>
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ======= NAV ======= -->
<nav class="tab-nav" id="mainNav">
  <a href="index.html" class="tab-btn">&#128202; Merit Table</a>
  <a href="index.html#predictor" class="tab-btn">&#127919; My Prediction</a>
  <a href="simulation.html" class="tab-btn">&#127973; Induction Portal</a>
  <a href="reviews.html" class="tab-btn">&#128172; Discussion</a>
  <a href="chat.html" class="tab-btn active">&#128488; Chat</a>
  <a href="donate.html" class="tab-btn donate-btn">&#9829; Support</a>
</nav>

<!-- ======= MAIN ======= -->
<main class="chat-page">
  <div class="chat-container">

    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-icon">💬</div>
      <div class="chat-header-info">
        <h2>Community Chat</h2>
        <p>Real-time discussion &mdash; ask anything, help each other</p>
      </div>
      <div class="chat-online-badge">
        <span class="chat-online-dot"></span>
        <span id="chatOnlineCount">Live</span>
      </div>
    </div>

    <!-- Name bar -->
    <div class="chat-name-bar">
      <label for="chatNameInput">Your name:</label>
      <input type="text" id="chatNameInput" class="chat-name-input" placeholder="Dr. Anonymous" maxlength="60" />
      <span style="font-size:0.72rem;color:var(--text-light);">Visible to all</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="chat-loading">
        <div class="chat-loading-spinner"></div>
        Loading messages&hellip;
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
      <div class="chat-reply-preview" id="chatReplyPreview">
        <span>Replying to <span class="reply-to-name" id="replyToName"></span></span>
        <span class="reply-to-text" id="replyToText"></span>
        <button class="chat-reply-cancel" id="chatReplyCancel" aria-label="Cancel reply">&times;</button>
      </div>
      <div class="chat-input-row">
        <div class="chat-input-wrapper">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message&hellip;" rows="1" maxlength="1500"></textarea>
        </div>
        <button class="chat-send-btn" id="chatSendBtn" disabled aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>
</main>

<script src="chat.js"></script>
<script>
  // Hamburger nav toggle
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mainNav = document.getElementById('mainNav');
  if (hamburgerBtn && mainNav) {
    hamburgerBtn.addEventListener('click', function () {
      mainNav.classList.toggle('open');
      hamburgerBtn.classList.toggle('open');
    });
  }
</script>
</body>
</html>
