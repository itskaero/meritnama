<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeritNama — Share Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ background:#04060c; height:100%; overflow:hidden; }
body{
  font-family:'IBM Plex Sans', sans-serif;
  color:#eaf3f2;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── Animated background canvas ── */
#bgCanvas{
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block;
  z-index:0;
}

/* ── Card generator overlay ── */
.generator{
  position:relative; z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  padding:24px;
  max-width:560px;
  width:100%;
  max-height:100vh;
  overflow-y:auto;
}
.generator-wrap{
  background:rgba(4,6,12,.72);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(77,184,217,.12);
  border-radius:20px;
  padding:24px;
  width:100%;
  box-shadow:0 8px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(77,184,217,.04) inset;
}

/* ── Template style picker ── */
.style-picker{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.style-btn{
  flex:1; min-width:100px;
  padding:10px 8px;
  border-radius:12px;
  cursor:pointer;
  background:rgba(255,255,255,.03);
  color:#eaf3f2;
  font-family:'IBM Plex Sans',sans-serif;
  text-align:center;
  transition:all .2s;
  border:2px solid rgba(255,255,255,.06);
}
.style-btn:hover{
  border-color:rgba(77,184,217,.3) !important;
  box-shadow:0 0 14px rgba(77,184,217,.06);
}

/* ── Card canvas ── */
.card-wrap{
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.04);
  background:#04060c;
  position:relative;
  margin-bottom:16px;
}
#cardCanvas{
  display:block;
  width:100%;
  height:auto;
  aspect-ratio:480/640;
}

/* ── Action buttons ── */
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:.5px;
  background:rgba(255,255,255,.05);
  color:rgba(234,243,242,.8);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:9px 18px;
  cursor:pointer;
  transition:background .15s, color .15s, border-color .15s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.btn:hover{ background:rgba(255,255,255,.09); color:#eaf3f2; border-color:rgba(77,184,217,.2); }
.btn-primary{
  background:rgba(77,184,217,.1);
  color:#8ed6ed;
  border-color:rgba(77,184,217,.18);
}
.btn-primary:hover{
  background:rgba(77,184,217,.18);
  color:#b3e5f7;
  box-shadow:0 0 24px rgba(77,184,217,.08);
}
.record-indicator{
  font-size:11px;
  color:#e05470;
  margin:4px 0;
  animation:recPulse 1s ease-in-out infinite;
}
@keyframes recPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }
.status-msg{
  margin-top:6px;
  font-size:11px;
  color:rgba(234,243,242,.4);
  min-height:1.2em;
  letter-spacing:.3px;
}

/* ── Tagline (shown when generator hidden) ── */
#taglineWrap{
  text-align:center;
  pointer-events:none;
  display:none;
}
#taglineWrap img{
  width:320px; max-width:70vw;
  opacity:0;
  animation:breath 6s ease-in-out infinite;
}
@keyframes breath{ 0%,100%{ opacity:.08; } 50%{ opacity:.18; } }
.tagline{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; letter-spacing:3px;
  color:rgba(124,144,172,.25);
  text-transform:uppercase;
  margin-top:12px;
  opacity:0;
  animation:fadeTag 6s ease-in-out infinite;
}
@keyframes fadeTag{ 0%,100%{ opacity:0; } 30%{ opacity:.15; } 70%{ opacity:.15; } }

/* ── Controls ── */
#controlsBar{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:10;
  display:none;
  gap:8px;
}
body.controls #controlsBar{ display:flex; }
#controlsBar button{
  font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.5px;
  background:rgba(255,255,255,.04); color:rgba(234,243,242,.5);
  border:1px solid rgba(255,255,255,.06);
  border-radius:8px; padding:6px 12px; cursor:pointer;
  transition:background .15s, color .15s;
}
#controlsBar button:hover{ background:rgba(255,255,255,.08); color:#eaf3f2; }

/* ── Responsive ── */
@media(max-width:600px){
  .generator-wrap{ padding:16px; border-radius:16px; }
  .style-btn{ min-width:70px; font-size:11px; }
  .btn{ font-size:11px; padding:7px 12px; }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce){
  canvas{ animation:none !important; }
}

/* ── Share mode: show generator, hide tagline ── */
body.share-mode #taglineWrap{ display:none; }
body.share-mode .generator{ display:flex; }
body:not(.share-mode) .generator{ display:none; }
body:not(.share-mode) #taglineWrap{ display:block; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- ═══ Tagline (pure background mode) ═══ -->
<div id="taglineWrap" class="overlay">
  <img src="animation/logo-anim.svg" alt="MeritNama">
  <div class="tagline">Residency Induction Analytics &middot; Punjab</div>
</div>

<!-- ═══ Card Generator ═══ -->
<div class="generator">
  <div class="generator-wrap">
    <div class="style-picker" id="stylePicker"></div>

    <div class="card-wrap">
      <canvas id="cardCanvas" width="480" height="640"></canvas>
    </div>

    <div class="actions">
      <button id="btnDownloadPng" class="btn btn-primary">&#8595; PNG</button>
      <button id="btnGenerateVideo" class="btn">&#9654; Video</button>
      <button id="btnCopyLink" class="btn">&#128279; Link</button>
    </div>

    <div class="record-indicator hidden" id="recordIndicator">&#9679; Recording&hellip; <span id="recordProgress">0</span>%</div>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<!-- ═══ Background Controls ═══ -->
<div id="controlsBar">
  <button id="btnPlay">Pause</button>
  <button id="btnReset">Reset</button>
  <button id="btnClear">Clear Share</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// Animated background (kept from original)
// ═══════════════════════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let paused = false;
  let time = 0;
  let rafId = null;

  const PARTICLE_COUNT = 60;
  const particles = [];

  const blobs = [
    { cx:.3, cy:.25, r:.45, r2:.35, color:'47,227,154', speed:.11, phase:0 },
    { cx:.7, cy:.6,  r:.38, r2:.3,  color:'77,184,217', speed:.08, phase:1.8 },
    { cx:.5, cy:.8,  r:.32, r2:.28, color:'124,101,196',speed:.06, phase:3.2 },
    { cx:.2, cy:.7,  r:.28, r2:.22, color:'47,227,154', speed:.09, phase:4.5 },
    { cx:.8, cy:.3,  r:.35, r2:.25, color:'77,184,217', speed:.07, phase:2.3 },
  ];

  const GRID_SPACING = 80;
  let gridOffset = 0;
  const barCount = 14;
  const barHeights = [];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init(){
    resize();
    window.addEventListener('resize', resize);

    for(let i = 0; i < PARTICLE_COUNT; i++){
      particles.push({
        x: Math.random() * 2000 - 200,
        y: Math.random() * 1200 - 100,
        vx: (Math.random() - .5) * .08,
        vy: (Math.random() - .5) * .08 - .02,
        r: 1 + Math.random() * 2,
        a: .02 + Math.random() * .06,
      });
    }
    for(let i = 0; i < barCount; i++){
      barHeights.push(.2 + Math.random() * .6);
    }
  }

  function drawBlobs(t){
    for(const b of blobs){
      const dx = Math.sin(t * b.speed + b.phase) * .08;
      const dy = Math.cos(t * b.speed * .7 + b.phase + 1) * .06;
      const cx = (b.cx + dx) * W;
      const cy = (b.cy + dy) * H;
      const rx = b.r * Math.min(W, H);
      const ry = b.r2 * Math.min(W, H);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
      grad.addColorStop(0, `rgba(${b.color},.12)`);
      grad.addColorStop(.5, `rgba(${b.color},.05)`);
      grad.addColorStop(1, `rgba(${b.color},0)`);
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  function drawGrid(t){
    gridOffset = (gridOffset + .12) % GRID_SPACING;
    ctx.strokeStyle = 'rgba(77,184,217,.025)';
    ctx.lineWidth = 1;
    const off = gridOffset;
    for(let x = off - GRID_SPACING; x < W + GRID_SPACING; x += GRID_SPACING){
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H); ctx.stroke();
    }
    for(let y = off - GRID_SPACING; y < H + GRID_SPACING; y += GRID_SPACING){
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawParticles(t){
    for(const p of particles){
      p.x += p.vx; p.y += p.vy;
      if(p.x < -100) p.x = W + 100;
      if(p.x > W + 100) p.x = -100;
      if(p.y < -100) p.y = H + 100;
      if(p.y > H + 100) p.y = -100;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(77,184,217,${p.a})`;
      ctx.fill();
    }
  }

  function drawDataBars(t){
    const barW = 8, gap = 16;
    const totalW = barCount * (barW + gap) - gap;
    const startX = (W - totalW) / 2;
    const baseY = H * .85, maxH = H * .18;
    for(let i = 0; i < barCount; i++){
      const h = barHeights[i] * maxH * (.7 + .3 * Math.sin(t * .04 + i * .9));
      const x = startX + i * (barW + gap);
      const y = baseY - h;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, h, 3);
      const alpha = .08 + .06 * Math.sin(t * .03 + i * .7);
      ctx.fillStyle = `rgba(47,227,154,${alpha})`;
      ctx.fill();
    }
  }

  function drawBg(t){
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#04060c');
    grad.addColorStop(.25, '#080f1a');
    grad.addColorStop(.55, '#0c1a2e');
    grad.addColorStop(.8, '#0a1424');
    grad.addColorStop(1, '#04060c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(now){
    if(!paused){ time = now / 1000; drawBg(time); drawGrid(time); drawDataBars(time); drawBlobs(time); drawParticles(time); }
    rafId = requestAnimationFrame(loop);
  }

  if(location.search.includes('controls')) document.body.classList.add('controls');

  document.getElementById('btnPlay').addEventListener('click', function(){ paused = !paused; this.textContent = paused ? 'Play' : 'Pause'; });
  document.getElementById('btnReset').addEventListener('click', function(){ for(let i = 0; i < barCount; i++) barHeights[i] = .2 + Math.random() * .6; gridOffset = 0; });

  init(); loop(0);

  window.MeritNamaBg = { canvas, pause:()=>{ paused = true; }, resume:()=>{ paused = false; }, isPaused:()=> paused, resize };
})();


// ═══════════════════════════════════════════════════════════════════
// Share Card Generator
// ═══════════════════════════════════════════════════════════════════
(function(){
  if(!location.search.includes('share') && !location.search.includes('controls')){
    document.body.classList.add('share-mode');
  } else if(location.search.includes('share')){
    document.body.classList.add('share-mode');
  }

  const TEMPLATES = [
    { id:'gradient', label:'Gradient', desc:'Cyan-purple glow',
      bg:['#0a1628','#162040'], accent:'#4db8d9', textColor:'#e8edf5',
      mutedColor:'rgba(232,237,245,0.5)', barColor:'rgba(77,184,217,0.15)', glowColor:'rgba(77,184,217,0.25)',
      fontTitle:'bold 28px "Space Grotesk",sans-serif', fontBody:'14px "IBM Plex Sans",sans-serif',
      fontSmall:'11px "IBM Plex Mono",monospace',
      renderExtra:function(ctx,w,h){
        var g=ctx.createRadialGradient(w*.8,h*.15,0,w*.8,h*.15,w*.6);
        g.addColorStop(0,'rgba(77,184,217,0.12)'); g.addColorStop(1,'rgba(77,184,217,0)');
        ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      }
    },
    { id:'dark', label:'Dark', desc:'Gold on black',
      bg:['#0d0d0d','#1a1a1a'], accent:'#e8a627', textColor:'#f0f0f0',
      mutedColor:'rgba(240,240,240,0.45)', barColor:'rgba(232,166,39,0.12)', glowColor:'rgba(232,166,39,0.2)',
      fontTitle:'bold 28px "Space Grotesk",sans-serif', fontBody:'14px "IBM Plex Sans",sans-serif',
      fontSmall:'11px "IBM Plex Mono",monospace',
      renderExtra:function(ctx,w,h){
        for(var i=0;i<8;i++){ var x=Math.random()*w,y=Math.random()*h,r=2+Math.random()*4; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle='rgba(232,166,39,0.08)'; ctx.fill(); }
      }
    },
    { id:'minimal', label:'Minimal', desc:'Clean white',
      bg:['#ffffff','#f5f7fa'], accent:'#1a2a4a', textColor:'#1a2a4a',
      mutedColor:'rgba(26,42,74,0.45)', barColor:'rgba(26,42,74,0.06)', glowColor:'rgba(26,42,74,0.1)',
      fontTitle:'bold 28px "Space Grotesk",sans-serif', fontBody:'14px "IBM Plex Sans",sans-serif',
      fontSmall:'11px "IBM Plex Mono",monospace',
      renderExtra:function(ctx,w,h){ ctx.strokeStyle='rgba(26,42,74,0.06)'; ctx.lineWidth=1; ctx.strokeRect(12,12,w-24,h-24); }
    },
    { id:'brand', label:'MeritNama', desc:'Teal-green brand',
      bg:['#0b2b2b','#0d1f1f'], accent:'#3ecf8e', textColor:'#e0f0ec',
      mutedColor:'rgba(224,240,236,0.5)', barColor:'rgba(62,207,142,0.12)', glowColor:'rgba(62,207,142,0.2)',
      fontTitle:'bold 28px "Space Grotesk",sans-serif', fontBody:'14px "IBM Plex Sans",sans-serif',
      fontSmall:'11px "IBM Plex Mono",monospace',
      renderExtra:function(ctx,w,h){ var g=ctx.createLinearGradient(0,h,w,0); g.addColorStop(0,'rgba(62,207,142,0.06)'); g.addColorStop(1,'rgba(62,207,142,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); }
    },
  ];

  var activeId = 'gradient';
  var recording = false;
  var canvas = document.getElementById('cardCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  function esc(s){ var d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

  function status(msg,color){
    var el=document.getElementById('statusMsg'); if(el){ el.textContent=msg; el.style.color=color||'rgba(234,243,242,.4)'; }
  }

  function renderCard(id, progress, time){
    var tpl = TEMPLATES.find(function(t){ return t.id === id; }) || TEMPLATES[0];
    var isAnim = arguments.length > 1;
    if(!isAnim) activeId = tpl.id;

    // Background
    var bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,tpl.bg[0]); bg.addColorStop(1,tpl.bg[1]);
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    if(tpl.renderExtra) tpl.renderExtra(ctx,W,H);

    // Top bar
    ctx.fillStyle=tpl.barColor; ctx.fillRect(0,0,W,4);

    // Logo
    ctx.fillStyle=tpl.accent; ctx.font=tpl.fontTitle;
    ctx.textAlign='center'; ctx.textBaseline='top';
    var glow = isAnim ? 12 + 14 * (0.6 + 0.4 * Math.sin(time * 2.5)) : 20;
    ctx.shadowColor=tpl.glowColor; ctx.shadowBlur=glow;
    ctx.fillText('MeritNama', W/2, 48);
    ctx.shadowBlur=0;

    // Tagline
    ctx.fillStyle=tpl.mutedColor; ctx.font=tpl.fontBody; ctx.textAlign='center';
    ctx.fillText('Induction 2021 \u2014 Seat Allocation Simulator', W/2, 88);

    // Divider
    ctx.fillStyle=tpl.barColor; ctx.fillRect(W*.15, 120, W*.7, 1);

    // Features
    var features = [
      'Real-time seat allocation simulation',
      'Portal profile verification status',
      'Consent what-if scenario builder',
      'Multi-programme merit comparison',
      'Open data \u2014 no registration required',
    ];
    ctx.textAlign='left'; ctx.textBaseline='top';
    var startY = 150;
    for(var i=0;i<features.length;i++){
      var alpha = isAnim ? Math.max(0, Math.min(1, (progress - i*0.15)*3)) : 1;
      var offX = isAnim ? (1-alpha)*20 : 0;
      ctx.globalAlpha = alpha;
      ctx.fillStyle=tpl.accent; ctx.font='16px "IBM Plex Sans",sans-serif'; ctx.textAlign='center';
      ctx.fillText('\u2713', 68 - offX*.3, startY + i*36);
      ctx.textAlign='left'; ctx.fillStyle=tpl.textColor; ctx.font=tpl.fontBody;
      ctx.fillText(features[i], 86 - offX, startY + i*36);
    }
    ctx.globalAlpha=1;

    // CTA
    var ctaY = startY + features.length*36 + 24;
    var ctaW = 260, ctaH = 40, ctaX = (W-ctaW)/2;
    ctx.fillStyle=tpl.accent;
    ctx.shadowColor=tpl.glowColor;
    ctx.shadowBlur = isAnim ? 16 + 10*(0.6+0.4*Math.sin(time*2.5)) : 24;
    ctx.beginPath(); ctx.roundRect(ctaX, ctaY, ctaW, ctaH, 100); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 15px "IBM Plex Sans",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Check your merit position \u2192', W/2, ctaY + ctaH/2);

    // URL
    ctx.fillStyle=tpl.mutedColor; ctx.font=tpl.fontSmall; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('meritnama.pk  \u00B7  Open for all Induction 2021 applicants', W/2, H-20);
    ctx.fillStyle=tpl.barColor; ctx.fillRect(0, H-4, W, 4);
  }

  function renderStylePicker(){
    var container = document.getElementById('stylePicker');
    if(!container) return;
    container.innerHTML = TEMPLATES.map(function(t){
      var active = t.id === activeId
        ? 'border:2px solid '+t.accent+';box-shadow:0 0 16px '+t.accent.replace(')',',0.25)')+';background:'+t.bg[0]+';'
        : '';
      return '<button class="style-btn" data-id="'+esc(t.id)+'" style="'+
        'flex:1;min-width:90px;padding:10px 8px;border-radius:12px;cursor:pointer;'+
        'background:rgba(255,255,255,.03);color:#eaf3f2;font-family:"IBM Plex Sans",sans-serif;'+
        'text-align:center;transition:all .2s;border:2px solid rgba(255,255,255,.06);'+active+'">'+
        '<div style="font-weight:700;font-size:13px;">'+esc(t.label)+'</div>'+
        '<div style="font-size:10px;color:rgba(234,243,242,.4);margin-top:2px;">'+esc(t.desc)+'</div>'+
        '</button>';
    }).join('');
    container.querySelectorAll('.style-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ activeId = this.dataset.id; renderStylePicker(); renderCard(this.dataset.id); });
    });
  }

  function downloadPng(){
    var link = document.createElement('a');
    link.download = 'MeritNama-share-'+activeId+'.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    status('PNG downloaded.', '#8ed6ed');
  }

  function copyLink(){
    var url = (window.location.origin + window.location.pathname).replace(/\/+$/,'') + '?share';
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){ status('Link copied!', '#8ed6ed'); }, function(){ fallbackCopy(url); });
    } else { fallbackCopy(url); }
  }
  function fallbackCopy(url){
    var ta = document.createElement('textarea');
    ta.value = url; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); status('Link copied!', '#8ed6ed'); } catch(_){ status('Ctrl+C: '+url, '#e8a627'); }
    document.body.removeChild(ta);
  }

  function generateVideo(){
    if(recording) return;
    recording = true;

    var fps = 30;
    var secPerTpl = 2;
    var totalTpl = TEMPLATES.length;
    var totalSec = secPerTpl * totalTpl;
    var totalFrames = totalSec * fps;

    var stream = canvas.captureStream(fps);
    var mimeTypes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
    var mimeType = mimeTypes.find(function(m){ return MediaRecorder.isTypeSupported(m); }) || '';
    var chunks = [];
    var recorder = new MediaRecorder(stream, mimeType ? {mimeType:mimeType} : {});

    recorder.ondataavailable = function(e){ if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop = function(){
      recording = false;
      var blob = new Blob(chunks, {type:recorder.mimeType||'video/webm'});
      var ext = recorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
      var link = document.createElement('a');
      link.download = 'MeritNama-promo.'+ext;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
      document.getElementById('recordIndicator')?.classList.add('hidden');
      status('Video downloaded! ('+ext.toUpperCase()+')', '#8ed6ed');
    };

    recorder.start(1000/fps);
    var frame = 0;
    var indicator = document.getElementById('recordIndicator');
    var progressEl = document.getElementById('recordProgress');
    if(indicator) indicator.classList.remove('hidden');

    function drawFrame(){
      if(frame >= totalFrames){ recorder.stop(); return; }
      var t = frame / fps;
      var idx = Math.min(Math.floor(t / secPerTpl), totalTpl - 1);
      var localT = (t - idx * secPerTpl) / secPerTpl;
      renderCard(TEMPLATES[idx].id, localT, t);
      if(progressEl) progressEl.textContent = Math.round((frame/totalFrames)*100);
      frame++;
      requestAnimationFrame(drawFrame);
    }
    drawFrame();
  }

  // ── Init ──
  renderStylePicker();
  renderCard(TEMPLATES[0].id);

  document.getElementById('btnDownloadPng').addEventListener('click', downloadPng);
  document.getElementById('btnGenerateVideo').addEventListener('click', generateVideo);
  document.getElementById('btnCopyLink').addEventListener('click', copyLink);
  document.getElementById('btnClear').addEventListener('click', function(){ document.body.classList.remove('share-mode'); document.querySelector('.generator').style.display='none'; document.getElementById('taglineWrap').style.display='block'; });
})();
</script>
</body>
</html>
