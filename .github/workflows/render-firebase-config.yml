name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create firebase-config.js from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
        run: |
          : "${FIREBASE_API_KEY:?secret FIREBASE_API_KEY is not set}"
          : "${FIREBASE_AUTH_DOMAIN:?secret FIREBASE_AUTH_DOMAIN is not set}"
          : "${FIREBASE_PROJECT_ID:?secret FIREBASE_PROJECT_ID is not set}"
          : "${FIREBASE_STORAGE_BUCKET:?secret FIREBASE_STORAGE_BUCKET is not set}"
          : "${FIREBASE_MESSAGING_SENDER_ID:?secret FIREBASE_MESSAGING_SENDER_ID is not set}"
          : "${FIREBASE_APP_ID:?secret FIREBASE_APP_ID is not set}"
          : "${FIREBASE_VAPID_KEY:?secret FIREBASE_VAPID_KEY is not set}"
          envsubst '$FIREBASE_API_KEY $FIREBASE_AUTH_DOMAIN $FIREBASE_PROJECT_ID $FIREBASE_STORAGE_BUCKET $FIREBASE_MESSAGING_SENDER_ID $FIREBASE_APP_ID $FIREBASE_VAPID_KEY' \
            < firebase-config.template.js > firebase-config.js
          echo "firebase-config.js created successfully."
          envsubst '$FIREBASE_API_KEY $FIREBASE_AUTH_DOMAIN $FIREBASE_PROJECT_ID $FIREBASE_STORAGE_BUCKET $FIREBASE_MESSAGING_SENDER_ID $FIREBASE_APP_ID' \
            < firebase-messaging-sw.template.js > firebase-messaging-sw.js
          echo "firebase-messaging-sw.js created successfully."

      - name: Create emailjs-config.js from secrets
        env:
          EMAILJS_PUBLIC_KEY:  ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_SERVICE_ID:  ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
        run: |
          : "${EMAILJS_PUBLIC_KEY:?secret EMAILJS_PUBLIC_KEY is not set}"
          : "${EMAILJS_SERVICE_ID:?secret EMAILJS_SERVICE_ID is not set}"
          : "${EMAILJS_TEMPLATE_ID:?secret EMAILJS_TEMPLATE_ID is not set}"
          envsubst '$EMAILJS_PUBLIC_KEY $EMAILJS_SERVICE_ID $EMAILJS_TEMPLATE_ID' \
            < emailjs-config.template.js > emailjs-config.js
          echo "emailjs-config.js created successfully."

      - name: Sanitize candidate JSON and build auth index
        run: python3 build_candidate_auth_index.py

      - name: Stamp candidate data info into simulation.html
        run: |
          JSON_FILE="data/induction21_candidates.json"
          if [ -f "$JSON_FILE" ]; then
            # Count top-level array entries
            CANDIDATE_COUNT=$(python3 -c "import json,sys; d=json.load(open('$JSON_FILE')); print(f'{len(d):,}')")
            # Use the file's last-modified time in Git (commit date), formatted as YYYY-MM-DD HH:MM
            CANDIDATE_UPDATED=$(git log -1 --format="%ci" -- "$JSON_FILE" | cut -c1-16 | tr 'T' ' ')
            # Fallback: use current UTC time if file has no git history yet
            if [ -z "$CANDIDATE_UPDATED" ]; then
              CANDIDATE_UPDATED=$(date -u '+%Y-%m-%d %H:%M')
            fi
          else
            CANDIDATE_COUNT="0"
            CANDIDATE_UPDATED=$(date -u '+%Y-%m-%d %H:%M')
          fi
          export CANDIDATE_COUNT CANDIDATE_UPDATED
          echo "Candidate count: $CANDIDATE_COUNT  Updated: $CANDIDATE_UPDATED"
          envsubst '$CANDIDATE_COUNT $CANDIDATE_UPDATED' < simulation.html > simulation.html.tmp
          mv simulation.html.tmp simulation.html

      - name: Prepare site directory
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='officialMeritList/' \
            --exclude='officialGazette/' \
            --exclude='scripts/' \
            --exclude='*.md' \
            --exclude='firebase-config.template.js' \
            --exclude='emailjs-config.template.js' \
            --exclude='firebase-messaging-sw.template.js' \
            --exclude='firestore.rules' \
            . _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
