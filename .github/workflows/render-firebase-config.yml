name: Render Firebase Config

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render firebase-config.js from template
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import pathlib
          import sys

          template = pathlib.Path("firebase-config.template.js").read_text(encoding="utf-8")
          keys = sorted(set(re.findall(r"\$\{([A-Z0-9_]+)\}", template)))
          missing = [key for key in keys if not os.environ.get(key)]

          if missing:
            print(f"Missing required GitHub secrets: {', '.join(missing)}")
            sys.exit(1)

          rendered = template
          for key in keys:
            escaped_value = json.dumps(os.environ[key])[1:-1]
            rendered = rendered.replace(f"${{{key}}}", escaped_value)

          pathlib.Path("firebase-config.js").write_text(rendered, encoding="utf-8")
          print("firebase-config.js rendered successfully.")
          PY

      - name: Upload rendered config artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase-config
          path: firebase-config.js

      - name: Prepare GitHub Pages site artifact
        run: |
          mkdir -p /tmp/site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'officialMeritList/' \
            --exclude 'officialGazette/' \
            --exclude 'scripts/' \
            --exclude '*.md' \
            --exclude 'firebase-config.template.js' \
            --exclude 'firestore.rules' \
            ./ /tmp/site/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: render-config
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
