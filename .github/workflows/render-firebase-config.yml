name: Render Firebase Config

on:
  workflow_dispatch:

jobs:
  render-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render firebase-config.js from template
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          python - <<'PY'
          import os
          import re
          import pathlib
          import sys

          template = pathlib.Path("firebase-config.template.js").read_text(encoding="utf-8")
          keys = sorted(set(re.findall(r"\$\{([A-Z0-9_]+)\}", template)))
          missing = [key for key in keys if not os.environ.get(key)]

          if missing:
            print(f"Missing required GitHub secrets: {', '.join(missing)}")
            sys.exit(1)

          rendered = template
          for key in keys:
            rendered = rendered.replace(f"${{{key}}}", os.environ[key])

          pathlib.Path("firebase-config.js").write_text(rendered, encoding="utf-8")
          print("firebase-config.js rendered successfully.")
          PY

      - name: Upload rendered config artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase-config
          path: firebase-config.js
