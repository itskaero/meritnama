<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospitals — MeritNama</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <style>
    .hosp-hero {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      max-width: 750px;
      margin: 0 auto;
    }
    .hosp-hero h2 {
      font-size: 1.6rem;
      color: var(--neon-cyan);
      margin-bottom: 0.5rem;
    }
    .hosp-hero p { color: var(--text-muted); font-size: 0.95rem; }

    .hosp-search-wrap {
      max-width: 600px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .hosp-search {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .hosp-search:focus { border-color: var(--border-active); }

    .hosp-filters {
      max-width: 1200px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: flex-end;
    }
    .hosp-filters label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex: 1 1 160px;
    }
    .hosp-filters select {
      width: 100%;
      box-sizing: border-box;
      min-width: 0;
      padding: 0.5rem 0.7rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.82rem;
    }
    .hosp-filters select:focus { outline: none; border-color: var(--border-active); }
    #hospResetBtn {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      flex: 0 0 auto;
    }
    #hospResetBtn:hover { color: var(--text); border-color: var(--border-hover); }
    .hosp-result-info {
      max-width: 1200px;
      margin: 0 auto 0.8rem;
      padding: 0 1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .hosp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .hosp-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem 1.4rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .hosp-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .hosp-card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--neon-cyan);
      line-height: 1.3;
    }

    .hosp-card-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.78rem;
    }
    .hosp-stat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid;
    }
    .hosp-stat-seats { color: var(--neon-green); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.07); }
    .hosp-stat-spec  { color: var(--neon-purple); border-color: rgba(124,101,196,0.3); background: rgba(124,101,196,0.07); }
    .hosp-stat-type  { color: var(--neon-gold); border-color: rgba(232,166,39,0.3); background: rgba(232,166,39,0.07); }

    .hosp-card-specialties {
      font-size: 0.77rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hosp-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-area">
      <a href="app.html"><img src="logo.png" class="logo-img" alt="Meritnama" /></a>
    </div>
    <div class="header-meta">
      <span class="badge badge-info">Hospitals</span>
      <button class="mn-shortlist-trigger" data-shortlist-trigger title="My Shortlist">
        &#11088; Shortlist <span class="mn-shortlist-count" style="display:none;">0</span>
      </button>
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="app-shell">
<!-- ======= NAV ======= -->
<nav class="tab-nav" id="mainNav">
  <a href="app.html" class="tab-btn back-btn" style="text-decoration:none;">&#8592; Historical Data</a>
  <div class="nav-group-label">Explore</div>
  <a href="simulation.html" class="tab-btn" style="text-decoration:none;">&#127973; Induction Portal</a>
  <a href="accreditation.html" class="tab-btn" style="text-decoration:none;">&#9989; Accreditation</a>
  <a href="hospitals.html" class="tab-btn active" style="text-decoration:none;">&#127968; Hospitals</a>
  <a href="reviews.html" class="tab-btn" style="text-decoration:none;">&#128172; Discussion</a>
  <a href="donate.html" class="tab-btn donate-btn" style="text-decoration:none;">&#9829; Support</a>
</nav>
<div class="app-main">

<!-- ======= HERO ======= -->
<section class="hosp-hero">
  <h2>🏥 Hospital Directory</h2>
  <p>Browse all training hospitals from Induction 21 seat matrix. Click a hospital to view its full profile.</p>
</section>

<!-- ======= SEARCH + ADVANCED FILTERS ======= -->
<div class="hosp-search-wrap">
  <input type="text" class="hosp-search" id="hospSearch" placeholder="Search hospitals by name…" />
</div>
<div class="hosp-filters" id="hospFilters">
  <label>Specialty
    <select id="fSpecialty"><option value="">All Specialties</option></select>
  </label>
  <label>Program Type
    <select id="fType"><option value="">All Types</option></select>
  </label>
  <label>Minimum Seats
    <select id="fMinSeats">
      <option value="0">Any</option>
      <option value="5">5+</option>
      <option value="10">10+</option>
      <option value="20">20+</option>
      <option value="50">50+</option>
    </select>
  </label>
  <label>Sort By
    <select id="fSort">
      <option value="name">Name (A–Z)</option>
      <option value="seats">Most Seats</option>
      <option value="specialties">Most Specialties</option>
    </select>
  </label>
  <button id="hospResetBtn" type="button">Reset</button>
</div>

<!-- ======= RESULT COUNT ======= -->
<div class="hosp-result-info" id="hospResultInfo" style="display:none;"></div>

<!-- ======= GRID ======= -->
<div class="hosp-grid" id="hospGrid">
  <div class="hosp-empty">Loading hospitals…</div>
</div>

</div><!-- /app-main -->
</div><!-- /app-shell -->

<script>
(function() {
  'use strict';

  let allHospitals = [];

  async function loadData() {
    const res = await fetch('data/induction21_seats.json');
    const seats = await res.json();

    const map = {};
    for (const entry of seats) {
      const id = entry.hospitalId;
      if (!map[id]) {
        map[id] = {
          id: id,
          name: entry.hospitalName,
          specialties: new Set(),
          types: new Set(),
          totalSeats: 0
        };
      }
      map[id].specialties.add(entry.specialityName);
      map[id].types.add(entry.typeName);
      map[id].totalSeats += entry.seats;
    }

    allHospitals = Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
    populateFilterOptions();
    applyFilters();
  }

  function populateFilterOptions() {
    const specSet = new Set();
    const typeSet = new Set();
    allHospitals.forEach(h => {
      h.specialties.forEach(s => specSet.add(s));
      h.types.forEach(t => typeSet.add(t));
    });

    const specSel = document.getElementById('fSpecialty');
    Array.from(specSet).sort().forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      specSel.appendChild(opt);
    });

    const typeSel = document.getElementById('fType');
    Array.from(typeSet).sort().forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      typeSel.appendChild(opt);
    });
  }

  function applyFilters() {
    const q        = document.getElementById('hospSearch').value.trim().toLowerCase();
    const spec     = document.getElementById('fSpecialty').value;
    const type     = document.getElementById('fType').value;
    const minSeats = parseInt(document.getElementById('fMinSeats').value, 10) || 0;
    const sortBy   = document.getElementById('fSort').value;

    let filtered = allHospitals.filter(h => {
      if (q && !h.name.toLowerCase().includes(q)) return false;
      if (spec && !h.specialties.has(spec)) return false;
      if (type && !h.types.has(type)) return false;
      if (h.totalSeats < minSeats) return false;
      return true;
    });

    if (sortBy === 'seats') {
      filtered = filtered.slice().sort((a, b) => b.totalSeats - a.totalSeats);
    } else if (sortBy === 'specialties') {
      filtered = filtered.slice().sort((a, b) => b.specialties.size - a.specialties.size);
    } else {
      filtered = filtered.slice().sort((a, b) => a.name.localeCompare(b.name));
    }

    const info = document.getElementById('hospResultInfo');
    info.style.display = 'block';
    info.textContent = `Showing ${filtered.length.toLocaleString()} of ${allHospitals.length.toLocaleString()} hospitals`;

    render(filtered);
  }

  function render(hospitals) {
    const grid = document.getElementById('hospGrid');
    if (!hospitals.length) {
      grid.innerHTML = '<div class="hosp-empty">No hospitals match your filters.</div>';
      return;
    }

    grid.innerHTML = hospitals.map(h => {
      const specs = Array.from(h.specialties).sort().join(', ');
      const types = Array.from(h.types).sort().join(', ');
      return `
        <a href="hospital.html?id=${h.id}" class="hosp-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div class="hosp-card-name">${esc(h.name)}</div>
            <button class="mn-shortlist-btn" data-shortlist-id="hosp-${h.id}" data-shortlist-type="hospital"
              data-shortlist-label="${esc(h.name)}" data-shortlist-meta="${h.totalSeats} seats &bull; ${esc(types)}"
              data-shortlist-href="hospital.html?id=${h.id}" title="Save to shortlist">&#9734;</button>
          </div>
          <div class="hosp-card-stats">
            <span class="hosp-stat hosp-stat-seats">🪑 ${h.totalSeats} seats</span>
            <span class="hosp-stat hosp-stat-spec">🩺 ${h.specialties.size} specialties</span>
            <span class="hosp-stat hosp-stat-type">📜 ${types}</span>
          </div>
          <div class="hosp-card-specialties">${esc(specs)}</div>
        </a>`;
    }).join('');

    // Cards were injected after DOMContentLoaded — re-sync star states.
    if (window.MNShortlist) MNShortlist.sync();
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Search + filters
  document.getElementById('hospSearch').addEventListener('input', applyFilters);
  document.getElementById('fSpecialty').addEventListener('change', applyFilters);
  document.getElementById('fType').addEventListener('change', applyFilters);
  document.getElementById('fMinSeats').addEventListener('change', applyFilters);
  document.getElementById('fSort').addEventListener('change', applyFilters);
  document.getElementById('hospResetBtn').addEventListener('click', function() {
    document.getElementById('hospSearch').value = '';
    document.getElementById('fSpecialty').value = '';
    document.getElementById('fType').value = '';
    document.getElementById('fMinSeats').value = '0';
    document.getElementById('fSort').value = 'name';
    applyFilters();
  });

  loadData();
})();
</script>
<script src="js/design-system.js"></script>
<script src="js/shortlist.js"></script>
<script src="screenshot-guard.js"></script>
<script>
  // Hamburger nav toggle
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mainNav = document.getElementById('mainNav');
  if (hamburgerBtn && mainNav) {
    hamburgerBtn.addEventListener('click', function () {
      mainNav.classList.toggle('open');
      hamburgerBtn.classList.toggle('open');
    });
  }
</script>
</body>
</html>
