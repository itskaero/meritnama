<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospitals — MeritNama</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <style>
    .hosp-hero {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      max-width: 750px;
      margin: 0 auto;
    }
    .hosp-hero h2 {
      font-size: 1.6rem;
      color: var(--neon-cyan);
      margin-bottom: 0.5rem;
    }
    .hosp-hero p { color: var(--text-muted); font-size: 0.95rem; }

    .hosp-search-wrap {
      max-width: 600px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .hosp-search {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .hosp-search:focus { border-color: var(--border-active); }

    .hosp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .hosp-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem 1.4rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .hosp-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .hosp-card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--neon-cyan);
      line-height: 1.3;
    }

    .hosp-card-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.78rem;
    }
    .hosp-stat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid;
    }
    .hosp-stat-seats { color: var(--neon-green); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.07); }
    .hosp-stat-spec  { color: var(--neon-purple); border-color: rgba(124,101,196,0.3); background: rgba(124,101,196,0.07); }
    .hosp-stat-type  { color: var(--neon-gold); border-color: rgba(232,166,39,0.3); background: rgba(232,166,39,0.07); }

    .hosp-card-specialties {
      font-size: 0.77rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hosp-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-area">
      <a href="app.html"><img src="logo.png" class="logo-img" alt="Meritnama" /></a>
    </div>
    <div class="header-meta">
      <span class="badge badge-info">Hospitals</span>
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="app-shell">
<!-- ======= NAV ======= -->
<nav class="tab-nav" id="mainNav">
  <a href="app.html" class="tab-btn back-btn" style="text-decoration:none;">&#8592; Historical Data</a>
  <div class="nav-group-label">Explore</div>
  <a href="simulation.html" class="tab-btn" style="text-decoration:none;">&#127973; Induction Portal</a>
  <a href="accreditation.html" class="tab-btn" style="text-decoration:none;">&#9989; Accreditation</a>
  <a href="hospitals.html" class="tab-btn active" style="text-decoration:none;">&#127968; Hospitals</a>
  <a href="reviews.html" class="tab-btn" style="text-decoration:none;">&#128172; Discussion</a>
  <a href="donate.html" class="tab-btn donate-btn" style="text-decoration:none;">&#9829; Support</a>
</nav>
<div class="app-main">

<!-- ======= HERO ======= -->
<section class="hosp-hero">
  <h2>🏥 Hospital Directory</h2>
  <p>Browse all training hospitals from Induction 21 seat matrix. Click a hospital to view its full profile.</p>
</section>

<!-- ======= SEARCH ======= -->
<div class="hosp-search-wrap">
  <input type="text" class="hosp-search" id="hospSearch" placeholder="Search hospitals by name…" />
</div>

<!-- ======= GRID ======= -->
<div class="hosp-grid" id="hospGrid">
  <div class="hosp-empty">Loading hospitals…</div>
</div>

</div><!-- /app-main -->
</div><!-- /app-shell -->

<script>
(function() {
  'use strict';

  let allHospitals = [];

  async function loadData() {
    const res = await fetch('data/induction21_seats.json');
    const seats = await res.json();

    const map = {};
    for (const entry of seats) {
      const id = entry.hospitalId;
      if (!map[id]) {
        map[id] = {
          id: id,
          name: entry.hospitalName,
          specialties: new Set(),
          types: new Set(),
          totalSeats: 0
        };
      }
      map[id].specialties.add(entry.specialityName);
      map[id].types.add(entry.typeName);
      map[id].totalSeats += entry.seats;
    }

    allHospitals = Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
    render(allHospitals);
  }

  function render(hospitals) {
    const grid = document.getElementById('hospGrid');
    if (!hospitals.length) {
      grid.innerHTML = '<div class="hosp-empty">No hospitals found.</div>';
      return;
    }

    grid.innerHTML = hospitals.map(h => {
      const specs = Array.from(h.specialties).sort().join(', ');
      const types = Array.from(h.types).sort().join(', ');
      return `
        <a href="hospital.html?id=${h.id}" class="hosp-card">
          <div class="hosp-card-name">${esc(h.name)}</div>
          <div class="hosp-card-stats">
            <span class="hosp-stat hosp-stat-seats">🪑 ${h.totalSeats} seats</span>
            <span class="hosp-stat hosp-stat-spec">🩺 ${h.specialties.size} specialties</span>
            <span class="hosp-stat hosp-stat-type">📜 ${types}</span>
          </div>
          <div class="hosp-card-specialties">${esc(specs)}</div>
        </a>`;
    }).join('');
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Search
  document.getElementById('hospSearch').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { render(allHospitals); return; }
    render(allHospitals.filter(h => h.name.toLowerCase().includes(q)));
  });

  loadData();
})();
</script>
<script src="screenshot-guard.js"></script>
<script>
  // Hamburger nav toggle
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mainNav = document.getElementById('mainNav');
  if (hamburgerBtn && mainNav) {
    hamburgerBtn.addEventListener('click', function () {
      mainNav.classList.toggle('open');
      hamburgerBtn.classList.toggle('open');
    });
  }
</script>
</body>
</html>
