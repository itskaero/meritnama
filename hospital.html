<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Profile — MeritNama</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <style>
    .hp-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    /* ── Hero ── */
    .hp-hero {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .hp-hero h2 {
      font-size: 1.5rem;
      color: var(--neon-cyan);
      margin-bottom: 0.4rem;
    }
    .hp-hero .hp-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Summary stats ── */
    .hp-summary {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.5rem 0 2rem;
    }
    .hp-stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem;
      text-align: center;
      min-width: 120px;
    }
    .hp-stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--neon-cyan);
    }
    .hp-stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── Sections ── */
    .hp-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .hp-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(77,184,217,0.03);
    }
    .hp-section-header h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--neon-cyan);
      margin: 0;
    }
    .hp-section-body {
      padding: 1.2rem 1.4rem;
    }

    /* ── Seat table ── */
    .hp-table-wrap {
      overflow-x: auto;
    }
    .hp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    .hp-table th,
    .hp-table td {
      padding: 0.55rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .hp-table th {
      color: var(--text-muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: var(--bg-card);
    }
    .hp-table td { color: var(--text); }
    .hp-table tr:hover td { background: var(--bg-hover); }
    .hp-table .seats-cell {
      font-weight: 700;
      color: var(--neon-green);
    }

    /* ── Type breakdown pills ── */
    .hp-type-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .hp-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .hp-pill.active { opacity: 1; }
    .hp-pill:not(.active) { opacity: 0.5; }
    .hp-pill-fcps { color: var(--neon-cyan); border-color: rgba(77,184,217,0.4); background: rgba(77,184,217,0.08); }
    .hp-pill-ms   { color: var(--neon-purple); border-color: rgba(124,101,196,0.4); background: rgba(124,101,196,0.08); }
    .hp-pill-md   { color: var(--neon-green); border-color: rgba(62,207,142,0.4); background: rgba(62,207,142,0.08); }

    /* ── Reviews section ── */
    .hp-reviews-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .hp-review-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }
    .hp-review-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .hp-review-author { font-size: 0.84rem; font-weight: 600; color: var(--text); }
    .hp-review-time { font-size: 0.72rem; color: var(--text-muted); }
    .hp-review-stars { color: var(--neon-gold); font-size: 0.9rem; letter-spacing: 1px; }
    .hp-review-stars .empty { color: var(--text-light); }
    .hp-review-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 0.4rem;
    }

    .hp-review-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Review form ── */
    .hp-review-form {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }
    .hp-review-form h4 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.7rem;
    }
    .hp-form-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 0.7rem;
    }
    .hp-form-row input,
    .hp-form-row select {
      flex: 1;
      min-width: 120px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.8rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.84rem;
      outline: none;
    }
    .hp-form-row input:focus,
    .hp-form-row select:focus { border-color: var(--border-active); }
    .hp-form-row select option { background: #0d1626; }

    .hp-form-textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.84rem;
      outline: none;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 0.7rem;
    }
    .hp-form-textarea:focus { border-color: var(--border-active); }

    .hp-star-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0.7rem;
    }
    .hp-star-picker button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--text-light);
      padding: 0;
      transition: color 0.15s, transform 0.12s;
    }
    .hp-star-picker button:hover,
    .hp-star-picker button.active { color: var(--neon-gold); transform: scale(1.2); }
    .hp-star-label { font-size: 0.78rem; color: var(--text-muted); margin-left: 6px; }

    .hp-submit-btn {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      color: #fff;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .hp-submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .hp-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .hp-form-status {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1em;
    }
    .hp-form-status.success { color: var(--neon-green); }
    .hp-form-status.error   { color: var(--danger); }

    /* ── Clickable specialty rows ── */
    .hp-spec-row { cursor: pointer; }
    .hp-spec-row:hover td { background: var(--bg-hover); }
    .hp-spec-row.selected td { background: rgba(77,184,217,0.08); }
    .hp-spec-row.selected td:first-child { color: var(--neon-cyan); font-weight: 700; }
    .hp-spec-link {
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
      padding: 0;
      text-align: left;
      width: 100%;
    }
    .hp-spec-link:hover { color: var(--neon-cyan); text-decoration: underline; }

    /* ── Selected specialty badge in review form ── */
    .hp-spec-selected {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(77,184,217,0.12);
      border: 1px solid rgba(77,184,217,0.3);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--neon-cyan);
      margin-bottom: 0.7rem;
    }
    .hp-spec-selected button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
    }
    .hp-spec-selected button:hover { color: var(--danger); }

    /* ── Specialty tag on review cards ── */
    .hp-review-spec {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--neon-cyan);
      background: rgba(77,184,217,0.1);
      border: 1px solid rgba(77,184,217,0.2);
      border-radius: 100px;
      padding: 2px 8px;
      margin-top: 4px;
    }

    /* ── Reviews filter hint ── */
    .hp-reviews-filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .hp-reviews-filter-bar a {
      color: var(--neon-cyan);
      cursor: pointer;
      text-decoration: underline;
    }

    /* ── Back link ── */
    .hp-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 1.5rem 0 0 1rem;
      font-size: 0.85rem;
      color: var(--neon-cyan);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .hp-back:hover { opacity: 1; }

    .hp-not-found {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .hp-not-found h2 { color: var(--danger); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-area">
      <a href="index.html"><img src="logo.svg" class="logo-img" alt="Meritnama" /></a>
    </div>
    <div class="header-meta">
      <a href="simulation.html?tab=hospitals" class="badge badge-info">← All Hospitals</a>
    </div>
  </div>
</header>

<a href="simulation.html?tab=hospitals" class="hp-back">← Back to Hospital Directory</a>

<div class="hp-container" id="hpContent">
  <div class="hp-not-found">
    <h2>Loading…</h2>
    <p>Fetching hospital data.</p>
  </div>
</div>

<script>
(function() {
  'use strict';

  const STAR_LABELS = ['', 'Poor', 'Fair', 'Good', 'Great', 'Excellent'];
  const db = firebase.firestore();
  let hospitalId = null;
  let hospitalName = '';
  let selectedStars = 0;
  let selectedSpecialty = null;

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function relTime(date) {
    const diff = Date.now() - date.getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + 'd ago';
    return date.toLocaleDateString();
  }

  function starsHtml(n) {
    let s = '';
    for (let i = 1; i <= 5; i++) s += i <= n ? '★' : '<span class="empty">★</span>';
    return s;
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    hospitalId = parseInt(params.get('id'), 10);
    if (isNaN(hospitalId)) { showNotFound(); return; }

    const res = await fetch('data/induction21_seats.json');
    const seats = await res.json();

    const hospSeats = seats.filter(s => s.hospitalId === hospitalId);
    if (!hospSeats.length) { showNotFound(); return; }

    hospitalName = hospSeats[0].hospitalName;
    document.title = hospitalName + ' — MeritNama';

    // Aggregate data
    const specialties = {};
    const types = new Set();
    let totalSeats = 0;

    for (const s of hospSeats) {
      types.add(s.typeName);
      totalSeats += s.seats;
      const key = s.specialityName;
      if (!specialties[key]) specialties[key] = { fcps: 0, ms: 0, md: 0, total: 0 };
      const typeKey = (s.typeName || '').toLowerCase();
      if (typeKey) {
        specialties[key][typeKey] = (specialties[key][typeKey] || 0) + s.seats;
      }
      specialties[key].total += s.seats;
    }

    const sortedSpecs = Object.entries(specialties).sort((a, b) => b[1].total - a[1].total);
    const typeList = Array.from(types).sort();

    renderProfile(hospitalName, totalSeats, sortedSpecs, typeList);
    loadReviews(null);
  }

  function showNotFound() {
    document.getElementById('hpContent').innerHTML = `
      <div class="hp-not-found">
        <h2>Hospital Not Found</h2>
        <p>The hospital you're looking for doesn't exist in our database.</p>
        <a href="hospitals.html" class="hp-back" style="margin:1rem auto;display:inline-flex;">← Browse all hospitals</a>
      </div>`;
  }

  function renderProfile(name, totalSeats, specs, types) {
    const specCount = specs.length;
    const container = document.getElementById('hpContent');

    container.innerHTML = `
      <!-- Hero -->
      <section class="hp-hero">
        <h2>🏥 ${esc(name)}</h2>
        <p class="hp-subtitle">Training hospital profile from Induction Portal seat data</p>
      </section>

      <!-- Summary -->
      <div class="hp-summary">
        <div class="hp-stat-box">
          <div class="hp-stat-val">${totalSeats}</div>
          <div class="hp-stat-label">Total Seats</div>
        </div>
        <div class="hp-stat-box">
          <div class="hp-stat-val">${specCount}</div>
          <div class="hp-stat-label">Specialties</div>
        </div>
        <div class="hp-stat-box">
          <div class="hp-stat-val">${types.join(', ')}</div>
          <div class="hp-stat-label">Programs</div>
        </div>
      </div>

      <!-- Seat Distribution -->
      <div class="hp-section">
        <div class="hp-section-header">
          <span>📊</span>
          <h3>Seat Distribution by Specialty</h3>
        </div>
        <div class="hp-section-body">
          <div class="hp-type-pills" id="typePills">
            <span class="hp-pill hp-pill-fcps active" data-type="all">All</span>
            ${types.includes('FCPS') ? '<span class="hp-pill hp-pill-fcps" data-type="fcps">FCPS</span>' : ''}
            ${types.includes('MS') ? '<span class="hp-pill hp-pill-ms" data-type="ms">MS</span>' : ''}
            ${types.includes('MD') ? '<span class="hp-pill hp-pill-md" data-type="md">MD</span>' : ''}
          </div>
          <div class="hp-table-wrap">
            <table class="hp-table" id="seatTable">
              <thead>
                <tr>
                  <th>Specialty</th>
                  <th>FCPS</th>
                  <th>MS</th>
                  <th>MD</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                ${specs.map(([spec, d]) => `
                  <tr class="hp-spec-row" data-spec="${esc(spec)}">
                    <td><button class="hp-spec-link" data-spec="${esc(spec)}">${esc(spec)}</button></td>
                    <td>${d.fcps || '—'}</td>
                    <td>${d.ms || '—'}</td>
                    <td>${d.md || '—'}</td>
                    <td class="seats-cell">${d.total}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Reviews -->
      <div class="hp-section" id="reviewsSection">
        <div class="hp-section-header">
          <span>⭐</span>
          <h3 id="reviewsHeading">Training Reviews</h3>
        </div>
        <div class="hp-section-body">
          <div class="hp-reviews-filter-bar" id="reviewsFilterBar" style="display:none">
            <span id="reviewsFilterLabel"></span>
            <a id="reviewsShowAll">Show all reviews</a>
          </div>
          <div class="hp-reviews-list" id="reviewsList">
            <div class="hp-review-empty">Loading reviews…</div>
          </div>
          <div class="hp-review-form" id="reviewForm">
            <h4>Share your training experience at this hospital</h4>
            <div id="revSpecBadge" class="hp-spec-selected" style="display:none">
              <span>📌 Reviewing specialty: <strong id="revSpecLabel"></strong></span>
              <button onclick="clearSpecialty()" title="Clear specialty selection">✕</button>
            </div>
            <div id="revSpecHint" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.7rem;">
              💡 Click a specialty row above to write a specialty-specific review.
            </div>
            <div class="hp-star-picker" id="starPicker">
              <button data-val="1">★</button>
              <button data-val="2">★</button>
              <button data-val="3">★</button>
              <button data-val="4">★</button>
              <button data-val="5">★</button>
              <span class="hp-star-label" id="starLabel">Select rating</span>
            </div>
            <div class="hp-form-row">
              <input type="text" id="revName" placeholder="Your name (optional)" maxlength="50" />
              <select id="revYear">
                <option value="">Training year…</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
                <option value="Earlier">Earlier</option>
              </select>
            </div>
            <textarea class="hp-form-textarea" id="revText" placeholder="How was your training experience? (teaching quality, workload, environment…)" maxlength="2000"></textarea>
            <button class="hp-submit-btn" id="revSubmit">Submit Review</button>
            <div class="hp-form-status" id="revStatus"></div>
          </div>
        </div>
      </div>
    `;

    // Wire up type filter pills
    document.querySelectorAll('#typePills .hp-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        document.querySelectorAll('#typePills .hp-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        filterTable(this.dataset.type);
      });
    });

    // Wire up clickable specialty rows
    document.querySelectorAll('.hp-spec-row').forEach(row => {
      row.addEventListener('click', function() {
        selectSpecialty(this.dataset.spec);
      });
    });

    // Wire up star picker
    document.querySelectorAll('#starPicker button').forEach(btn => {
      btn.addEventListener('click', function() {
        selectedStars = parseInt(this.dataset.val, 10);
        document.querySelectorAll('#starPicker button').forEach((b, i) => {
          b.classList.toggle('active', i < selectedStars);
        });
        document.getElementById('starLabel').textContent = STAR_LABELS[selectedStars];
      });
    });

    // Submit review
    document.getElementById('revSubmit').addEventListener('click', submitReview);
  }

  // ── Specialty selection ──
  function selectSpecialty(spec) {
    selectedSpecialty = spec;

    // Highlight selected row
    document.querySelectorAll('.hp-spec-row').forEach(r => {
      r.classList.toggle('selected', r.dataset.spec === spec);
    });

    // Update review form badge
    document.getElementById('revSpecBadge').style.display = '';
    document.getElementById('revSpecLabel').textContent = spec;
    document.getElementById('revSpecHint').style.display = 'none';

    // Update reviews heading and filter bar
    document.getElementById('reviewsHeading').textContent = '⭐ Reviews — ' + spec;
    document.getElementById('reviewsFilterBar').style.display = '';
    document.getElementById('reviewsFilterLabel').textContent = 'Showing reviews for ' + spec;

    // Scroll to reviews
    document.getElementById('reviewsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Reload reviews for this specialty
    loadReviews(spec);
  }

  function clearSpecialty() {
    selectedSpecialty = null;

    document.querySelectorAll('.hp-spec-row').forEach(r => r.classList.remove('selected'));
    document.getElementById('revSpecBadge').style.display = 'none';
    document.getElementById('revSpecHint').style.display = '';
    document.getElementById('reviewsHeading').textContent = 'Training Reviews';
    document.getElementById('reviewsFilterBar').style.display = 'none';

    loadReviews(null);
  }
  // Expose to global scope so inline onclick handlers can call it
  window.clearSpecialty = clearSpecialty;

  function filterTable(type) {
    const table = document.getElementById('seatTable');
    const headers = table.querySelectorAll('th');
    const rows = table.querySelectorAll('tbody tr');

    // Show/hide columns based on type
    const colMap = { all: [0,1,2,3,4], fcps: [0,1,4], ms: [0,2,4], md: [0,3,4] };
    const visibleCols = colMap[type] || colMap.all;

    headers.forEach((th, i) => th.style.display = visibleCols.includes(i) ? '' : 'none');
    rows.forEach(row => {
      row.querySelectorAll('td').forEach((td, i) => td.style.display = visibleCols.includes(i) ? '' : 'none');
    });
  }

  // ── Reviews (Firestore) ──
  async function loadReviews(filterSpec) {
    const list = document.getElementById('reviewsList');
    list.innerHTML = '<div class="hp-review-empty">Loading reviews…</div>';
    try {
      let query = db.collection('hospital_reviews')
        .where('hospitalId', '==', hospitalId)
        .limit(60);

      if (filterSpec) {
        query = db.collection('hospital_reviews')
          .where('hospitalId', '==', hospitalId)
          .where('specialty', '==', filterSpec)
          .limit(60);
      }

      const snap = await query.get();

      if (snap.empty) {
        list.innerHTML = filterSpec
          ? `<div class="hp-review-empty">No reviews yet for <strong>${esc(filterSpec)}</strong>. Be the first!</div>`
          : '<div class="hp-review-empty">No reviews yet. Be the first to share your experience!</div>';
        return;
      }

      // sort client-side to avoid composite index requirement
      const docs = snap.docs.slice().sort((a, b) => {
        const ta = a.data().createdAt?.toMillis() ?? 0;
        const tb = b.data().createdAt?.toMillis() ?? 0;
        return tb - ta;
      });

      if (snap.empty) {
        list.innerHTML = filterSpec
          ? `<div class="hp-review-empty">No reviews yet for <strong>${esc(filterSpec)}</strong>. Be the first!</div>`
          : '<div class="hp-review-empty">No reviews yet. Be the first to share your experience!</div>';
        return;
      }

      list.innerHTML = docs.map(doc => {
        const d = doc.data();
        const date = d.createdAt ? d.createdAt.toDate() : new Date();
        const specTag = d.specialty ? `<div><span class="hp-review-spec">📌 ${esc(d.specialty)}</span></div>` : '';
        return `
          <div class="hp-review-card">
            <div class="hp-review-top">
              <span class="hp-review-author">${esc(d.author || 'Anonymous')}</span>
              <span class="hp-review-time">${d.year ? d.year + ' · ' : ''}${relTime(date)}</span>
            </div>
            <div class="hp-review-stars">${starsHtml(d.rating || 0)}</div>
            ${specTag}
            <div class="hp-review-text">${esc(d.text)}</div>
          </div>`;
      }).join('');

      // Wire "Show all reviews" link
      const showAll = document.getElementById('reviewsShowAll');
      if (showAll) showAll.onclick = () => clearSpecialty();

    } catch (e) {
      list.innerHTML = '<div class="hp-review-empty">Unable to load reviews.</div>';
      console.error('loadReviews error:', e);
    }
  }

  async function submitReview() {
    const status = document.getElementById('revStatus');
    const text = document.getElementById('revText').value.trim();

    if (!selectedStars) { status.className = 'hp-form-status error'; status.textContent = 'Please select a star rating.'; return; }
    if (!text) { status.className = 'hp-form-status error'; status.textContent = 'Please write a brief review.'; return; }

    const btn = document.getElementById('revSubmit');
    btn.disabled = true;
    status.className = 'hp-form-status'; status.textContent = 'Submitting…';

    try {
      await db.collection('hospital_reviews').add({
        hospitalId: hospitalId,
        hospitalName: hospitalName,
        specialty: selectedSpecialty || null,
        author: document.getElementById('revName').value.trim() || 'Anonymous',
        year: document.getElementById('revYear').value || null,
        rating: selectedStars,
        text: text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      status.className = 'hp-form-status success';
      status.textContent = 'Review submitted! Thank you.';
      document.getElementById('revText').value = '';
      document.getElementById('revName').value = '';
      document.getElementById('revYear').value = '';
      selectedStars = 0;
      document.querySelectorAll('#starPicker button').forEach(b => b.classList.remove('active'));
      document.getElementById('starLabel').textContent = 'Select rating';

      // Reload reviews
      setTimeout(() => loadReviews(selectedSpecialty), 1000);
    } catch (e) {
      status.className = 'hp-form-status error';
      status.textContent = 'Error submitting review. Please try again.';
    }
    btn.disabled = false;
  }

  init();
})();
</script>
</body>
</html>
